databases:
  - name: aplan-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: aplan-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:shared && npm run build --workspace packages/api && npx prisma db push --schema packages/api/prisma/schema.prisma --accept-data-loss
    startCommand: node packages/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aplan-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        fromService:
          type: web
          name: aplan-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: aplan-web
    runtime: static
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:shared && npm run build --workspace packages/web
    staticPublishPath: packages/web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aplan-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
